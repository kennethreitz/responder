name: "Tests"

on:
  push:
    branches: [ main ]
  pull_request: ~
  workflow_dispatch:

# Cancel redundant in-progress jobs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  test:
    name: "Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [
          "3.10",
          "3.11",
          "3.12",
          "3.13",
          "3.14",
          "3.14t",
          "pypy3.11",
        ]

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        activate-environment: true
        enable-cache: true
        cache-suffix: ${{ matrix.python-version }}
        python-version: ${{ matrix.python-version }}

    - name: Install package
      run: uv pip install '.[develop,test]'

    - name: Run tests
      run: pytest

  client-codegen:
    name: "Generated client syntax checks"
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        activate-environment: true
        enable-cache: true
        python-version: "3.12"

    - name: Install package
      run: uv pip install '.[develop,test]'

    # Toolchains for the generated clients, so JS/TS/Ruby/PHP are
    # compile-verified rather than only string-asserted.
    - uses: actions/setup-node@v4
      with:
        node-version: "20"

    - uses: denoland/setup-deno@v2
      with:
        deno-version: v2.x

    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: "3.3"

    - uses: shivammathur/setup-php@v2
      with:
        php-version: "8.3"

    - name: Verify generated clients in every language
      run: pytest tests/test_clientgen.py -q -rs
